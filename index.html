<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Album Copa - Revista</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./vendor/page-flip.browser.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="magazine-stage" aria-label="Visualizador em formato de revista">
        <button id="coverView" class="cover-view" type="button" aria-label="Abrir revista">
          <span class="page cover image-cover">
            <img src="./Paginas/Capa.png" alt="Capa do album" />
          </span>
        </button>
        <div id="book" class="book" aria-live="polite"></div>
      </section>

      <nav class="toolbar" aria-label="Controles da revista">
        <button class="icon-button" id="prevPage" type="button" aria-label="Pagina anterior" title="Pagina anterior">
          <span aria-hidden="true">‹</span>
        </button>
        <div class="page-status" id="pageStatus">Capa</div>
        <button class="icon-button" id="nextPage" type="button" aria-label="Proxima pagina" title="Proxima pagina">
          <span aria-hidden="true">›</span>
        </button>
      </nav>

      <aside class="side-rail" aria-label="Menu do album">
        <button class="rail-button" id="openShop" type="button" aria-label="Loja" title="Loja">
          <span class="rail-icon" aria-hidden="true">◆</span>
          <span class="rail-label">Loja</span>
        </button>
        <button class="rail-button" type="button" aria-label="Perfil" title="Perfil">
          <span class="rail-icon" aria-hidden="true">●</span>
          <span class="rail-label">Perfil</span>
        </button>
        <button class="rail-button" type="button" aria-label="Estatisticas" title="Estatisticas">
          <span class="rail-icon" aria-hidden="true">▦</span>
          <span class="rail-label">Stats</span>
        </button>
        <button class="rail-button" type="button" aria-label="Checklist" title="Checklist">
          <span class="rail-icon" aria-hidden="true">✓</span>
          <span class="rail-label">Lista</span>
        </button>
        <button class="rail-button" type="button" aria-label="Album" title="Album">
          <span class="rail-icon" aria-hidden="true">▣</span>
          <span class="rail-label">Album</span>
        </button>
      </aside>
    </main>

    <section id="shopPanel" class="shop-panel" aria-hidden="true">
      <button class="shop-backdrop" type="button" aria-label="Fechar loja"></button>
      <div class="shop-drawer" role="dialog" aria-modal="true" aria-label="Loja de figurinhas">
        <header class="shop-header">
          <div>
            <span>Album Copa 2026</span>
            <h2>Loja</h2>
          </div>
          <button class="shop-close" type="button" aria-label="Fechar loja">×</button>
        </header>

        <div class="shop-wallet">
          <span>Saldo de creditos</span>
          <strong><span id="creditBalance">0</span> CR</strong>
        </div>

        <section class="shop-section" aria-labelledby="creditTitle">
          <h3 id="creditTitle">Comprar creditos</h3>
          <div class="shop-grid">
            <button class="shop-card credit-card" type="button" data-credits="100">
              <strong>100 CR</strong>
              <span>Pacote inicial</span>
              <em>R$ 4,90</em>
            </button>
            <button class="shop-card credit-card" type="button" data-credits="300">
              <strong>300 CR</strong>
              <span>Mais popular</span>
              <em>R$ 12,90</em>
            </button>
            <button class="shop-card credit-card" type="button" data-credits="700">
              <strong>700 CR</strong>
              <span>Melhor valor</span>
              <em>R$ 24,90</em>
            </button>
          </div>
        </section>

        <section class="shop-section" aria-labelledby="packTitle">
          <h3 id="packTitle">Pacotes de figurinhas</h3>
          <div class="shop-grid">
            <button class="shop-card pack-card" type="button" data-cost="25" data-pack="Bronze">
              <strong>Bronze</strong>
              <span>3 figurinhas</span>
              <em>25 CR</em>
            </button>
            <button class="shop-card pack-card" type="button" data-cost="60" data-pack="Prata">
              <strong>Prata</strong>
              <span>8 figurinhas</span>
              <em>60 CR</em>
            </button>
            <button class="shop-card pack-card" type="button" data-cost="120" data-pack="Ouro">
              <strong>Ouro</strong>
              <span>18 figurinhas</span>
              <em>120 CR</em>
            </button>
          </div>
        </section>

        <p id="shopMessage" class="shop-message" role="status">Escolha creditos ou pacotes para comecar.</p>
      </div>
    </section>

    <div id="stickerModal" class="sticker-modal" aria-hidden="true">
      <button class="sticker-modal-backdrop" type="button" aria-label="Fechar figurinha"></button>
      <div class="sticker-modal-card" role="dialog" aria-modal="true" aria-label="Figurinha ampliada">
        <button class="sticker-modal-close" type="button" aria-label="Fechar figurinha">×</button>
        <img id="stickerModalImage" alt="" />
      </div>
    </div>
  </body>
</html>
